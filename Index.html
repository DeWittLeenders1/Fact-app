<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Almanac — A Fact a Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ground-1:#16242F;
    --ground-2:#1E3340;
    --paper:#F5EFE2;
    --paper-edge:#E8DFCB;
    --ink:#22303A;
    --ink-soft:#5C6B73;
    --gold:#C2902F;
    --gold-deep:#9E7220;
    --line:rgba(34,48,58,.12);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--paper);
    background:
      radial-gradient(120% 90% at 50% -10%, #24414f 0%, var(--ground-2) 42%, var(--ground-1) 100%);
    background-attachment:fixed;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:max(18px,env(safe-area-inset-top)) 18px max(24px,env(safe-area-inset-bottom));
  }

  .bar{
    width:100%;max-width:560px;
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:26px;
  }
  .wordmark{
    font-family:'Fraunces',serif;font-weight:600;
    font-size:21px;letter-spacing:.02em;color:var(--paper);
  }
  .wordmark .dot{color:var(--gold);}
  .tagline{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,239,226,.5);}

  .card{
    position:relative;
    width:100%;max-width:560px;
    background:var(--paper);
    color:var(--ink);
    border-radius:18px;
    padding:54px 34px 30px;
    box-shadow:0 1px 0 rgba(255,255,255,.25) inset,
               0 26px 50px -18px rgba(0,0,0,.55),
               0 6px 14px -8px rgba(0,0,0,.4);
    transition:transform .28s cubic-bezier(.2,.7,.2,1),opacity .28s;
  }
  .tab{
    position:absolute;top:-15px;left:34px;
    background:var(--ink);color:var(--paper);
    font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
    padding:8px 15px;border-radius:8px;
    box-shadow:0 8px 16px -8px rgba(0,0,0,.6);
  }
  .tab .num{color:var(--gold);}
  .chip-cat{
    display:inline-block;
    font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    color:var(--gold-deep);
    margin-bottom:18px;
  }
  .chip-cat::before{content:"";display:inline-block;width:18px;height:1px;
    background:var(--gold);vertical-align:middle;margin-right:9px;margin-bottom:3px;}
  .fact{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:clamp(25px,5.4vw,33px);
    line-height:1.28;
    letter-spacing:-.01em;
    margin:0 0 26px;
    min-height:148px;
  }
  .card-foot{
    display:flex;align-items:center;justify-content:space-between;
    border-top:1px solid var(--line);padding-top:16px;
  }
  .counter{font-size:12px;color:var(--ink-soft);letter-spacing:.04em;}
  .heart{
    appearance:none;border:none;background:none;cursor:pointer;
    font-size:22px;line-height:1;padding:4px;color:var(--ink-soft);
    transition:transform .15s,color .15s;
  }
  .heart:active{transform:scale(.8);}
  .heart.on{color:#C2453A;}

  .controls{
    width:100%;max-width:560px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    margin-top:22px;
  }
  .nav{
    appearance:none;cursor:pointer;
    width:52px;height:52px;border-radius:50%;
    border:1px solid rgba(245,239,226,.22);
    background:rgba(245,239,226,.06);color:var(--paper);
    font-size:20px;display:flex;align-items:center;justify-content:center;
    transition:background .15s,transform .12s;
  }
  .nav:active{transform:scale(.92);background:rgba(245,239,226,.14);}
  .surprise{
    flex:1;max-width:230px;height:52px;border-radius:26px;cursor:pointer;
    border:none;background:var(--gold);color:#241803;
    font-family:'Inter',sans-serif;font-weight:600;font-size:15px;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .12s,background .15s;
  }
  .surprise:active{transform:scale(.97);background:#d59c33;}

  .today-link{
    margin-top:16px;height:34px;border:none;background:none;cursor:pointer;
    color:rgba(245,239,226,.55);font-family:'Inter',sans-serif;font-size:13px;
    letter-spacing:.02em;text-decoration:underline;text-underline-offset:3px;
    opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .today-link.show{opacity:1;pointer-events:auto;}

  .rail-wrap{width:100%;max-width:560px;margin-top:30px;}
  .rail-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:rgba(245,239,226,.45);margin-bottom:12px;padding-left:2px;}
  .rail{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
  .rail::-webkit-scrollbar{display:none;}
  .pill{
    flex:0 0 auto;cursor:pointer;
    padding:9px 15px;border-radius:20px;
    border:1px solid rgba(245,239,226,.2);
    background:transparent;color:rgba(245,239,226,.8);
    font-family:'Inter',sans-serif;font-size:13px;font-weight:500;white-space:nowrap;
    transition:background .15s,color .15s,border-color .15s;
  }
  .pill.on{background:var(--paper);color:var(--ink);border-color:var(--paper);}

  .fav-toggle{
    width:100%;max-width:560px;margin-top:22px;cursor:pointer;
    background:rgba(245,239,226,.05);border:1px solid rgba(245,239,226,.16);
    color:var(--paper);border-radius:14px;padding:15px 18px;
    font-family:'Inter',sans-serif;font-size:14px;font-weight:500;
    display:flex;align-items:center;justify-content:space-between;
  }
  .fav-count{color:var(--gold);font-weight:600;}
  .fav-panel{
    width:100%;max-width:560px;margin-top:10px;
    display:none;flex-direction:column;gap:8px;
  }
  .fav-panel.open{display:flex;}
  .fav-item{
    background:rgba(245,239,226,.06);border-radius:12px;
    padding:14px 16px;font-family:'Fraunces',serif;font-size:16px;line-height:1.4;
    color:var(--paper);display:flex;gap:12px;align-items:flex-start;
  }
  .fav-item button{
    appearance:none;border:none;background:none;color:rgba(245,239,226,.45);
    cursor:pointer;font-size:18px;line-height:1;flex:0 0 auto;padding:2px;
  }
  .fav-empty{color:rgba(245,239,226,.45);font-size:14px;text-align:center;padding:22px;}

  .footnote{
    width:100%;max-width:560px;margin-top:30px;text-align:center;
    font-size:11px;color:rgba(245,239,226,.32);line-height:1.6;letter-spacing:.02em;
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none!important;animation:none!important;}
  }
  .fade{opacity:0;transform:translateY(6px);}
</style>
</head>
<body>
  <div class="bar">
    <span class="wordmark">Almanac<span class="dot">.</span></span>
    <span class="tagline">A fact a day</span>
  </div>

  <main class="card" id="card">
    <span class="tab">Day <span class="num" id="dayNum">—</span> of 366</span>
    <span class="chip-cat" id="catLabel">Loading</span>
    <p class="fact" id="factText">…</p>
    <div class="card-foot">
      <span class="counter" id="counter"></span>
      <button class="heart" id="heart" aria-label="Save to favorites">♡</button>
    </div>
  </main>

  <div class="controls">
    <button class="nav" id="prev" aria-label="Previous fact">‹</button>
    <button class="surprise" id="shuffle">✦ Surprise me</button>
    <button class="nav" id="next" aria-label="Next fact">›</button>
  </div>
  <button class="today-link" id="todayBtn">← back to today’s fact</button>

  <div class="rail-wrap">
    <div class="rail-label">Browse by topic</div>
    <div class="rail" id="rail"></div>
  </div>

  <button class="fav-toggle" id="favToggle">
    <span>Saved facts</span>
    <span class="fav-count" id="favCount">0</span>
  </button>
  <div class="fav-panel" id="favPanel"></div>

  <p class="footnote">Tap the heart to keep a fact. Add this page to your Home Screen for a one-tap fact every morning.</p>

/* ----------  BUILD MASTER LIST  ---------- */
const MASTER = [];
Object.keys(DATA).forEach(cat=>{
  DATA[cat].forEach(text=> MASTER.push({text, cat}));
});

/* ----------  STORAGE (graceful)  ---------- */
const store = {
  read(){
    try{ return JSON.parse(localStorage.getItem('almanac_favs')||'[]'); }
    catch(e){ return window.__favs || []; }
  },
  write(arr){
    try{ localStorage.setItem('almanac_favs', JSON.stringify(arr)); }
    catch(e){ window.__favs = arr; }
  }
};
let favs = store.read();

/* ----------  STATE  ---------- */
let activeCat = 'all';
let pool = MASTER;
let index = 0;

function dayIndex(){
  const now = new Date();
  const start = new Date(now.getFullYear(),0,0);
  const diff = now - start;
  return Math.floor(diff / 86400000); // 1..366
}
function todayIndexFor(arr){ return dayIndex() % arr.length; }

/* ----------  RENDER  ---------- */
const el = id => document.getElementById(id);
const card = el('card');

function rebuildPool(){
  pool = activeCat==='all' ? MASTER : MASTER.filter(f=>f.cat===activeCat);
}

function render(animate){
  const item = pool[index];
  const paint = ()=>{
    el('factText').textContent = item.text;
    el('catLabel').textContent = CATS[item.cat].label;
    el('dayNum').textContent = dayIndex();
    el('counter').textContent = `Fact ${index+1} of ${pool.length}`;
    const saved = favs.includes(item.text);
    el('heart').textContent = saved ? '♥' : '♡';
    el('heart').classList.toggle('on', saved);
    const onToday = (activeCat==='all' && index===todayIndexFor(MASTER));
    el('todayBtn').classList.toggle('show', !onToday);
    if(animate){ card.classList.remove('fade'); }
  };
  if(animate){
    card.classList.add('fade');
    setTimeout(paint, 130);
  } else { paint(); }
}

function go(delta){
  index = (index + delta + pool.length) % pool.length;
  render(true);
}

/* ----------  CONTROLS  ---------- */
el('next').onclick = ()=>go(1);
el('prev').onclick = ()=>go(-1);
el('shuffle').onclick = ()=>{
  let r; do{ r = Math.floor(Math.random()*pool.length); } while(r===index && pool.length>1);
  index = r; render(true);
};
el('todayBtn').onclick = ()=>{
  activeCat='all'; rebuildPool();
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('on', p.dataset.cat==='all'));
  index = todayIndexFor(MASTER); render(true);
};
el('heart').onclick = ()=>{
  const t = pool[index].text;
  const i = favs.indexOf(t);
  if(i>=0) favs.splice(i,1); else favs.unshift(t);
  store.write(favs); render(false); renderFavs();
};

/* ----------  CATEGORY RAIL  ---------- */
const rail = el('rail');
function addPill(cat,label){
  const b = document.createElement('button');
  b.className='pill'+(cat==='all'?' on':'');
  b.textContent=label; b.dataset.cat=cat;
  b.onclick=()=>{
    activeCat=cat; rebuildPool();
    document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('on',p===b));
    index = cat==='all' ? todayIndexFor(MASTER) : 0;
    render(true);
  };
  rail.appendChild(b);
}
addPill('all','All topics');
Object.keys(CATS).forEach(c=>addPill(c,CATS[c].label));

/* ----------  FAVORITES  ---------- */
const favPanel = el('favPanel');
el('favToggle').onclick = ()=>{ favPanel.classList.toggle('open'); };
function renderFavs(){
  el('favCount').textContent = favs.length;
  favPanel.innerHTML='';
  if(favs.length===0){
    favPanel.innerHTML='<div class="fav-empty">No saved facts yet. Tap the heart on any fact to keep it here.</div>';
    return;
  }
  favs.forEach(t=>{
    const row=document.createElement('div');
    row.className='fav-item';
    const span=document.createElement('span'); span.textContent=t; span.style.flex='1';
    const x=document.createElement('button'); x.textContent='×'; x.setAttribute('aria-label','Remove');
    x.onclick=()=>{ favs=favs.filter(f=>f!==t); store.write(favs); renderFavs(); render(false); };
    row.appendChild(span); row.appendChild(x);
    favPanel.appendChild(row);
  });
}

/* ----------  INIT  ---------- */
rebuildPool();
index = todayIndexFor(MASTER);
render(false);
renderFavs();
</script>
